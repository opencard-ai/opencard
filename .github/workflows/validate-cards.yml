name: Validate Card Data

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Single source of truth: scripts/validate-all.ts.
      # Runs schema + business + sanity validation. Sanity rules catch the
      # 2026-04-25 CFPB regex bug (Premium-named card with annual_fee < $50).
      - name: Validate cards (schema + business + sanity)
        run: npm run validate

      # Tag enum drift catcher (e.g. unrecognized tags creeping in).
      - name: Lint tags
        run: npm run lint:tags

      # Stale-data warning (non-blocking — output only).
      - name: Check for stale cards (warning only)
        if: success() || failure()
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');
            const files = fs.readdirSync('data/cards').filter(f => f.endsWith('.json'));
            const ninetyDaysAgo = Date.now() - 90 * 24 * 60 * 60 * 1000;
            const stale = [];
            for (const file of files) {
              try {
                const card = JSON.parse(fs.readFileSync(path.join('data/cards', file), 'utf-8'));
                const verified = card.last_verified || card.last_updated;
                if (!verified) continue;
                const ts = Date.parse(verified);
                if (!isNaN(ts) && ts < ninetyDaysAgo) {
                  stale.push({ card: card.card_id, last_verified: verified });
                }
              } catch {}
            }
            console.log(\`Stale cards (not verified in 90+ days): \${stale.length} / \${files.length}\`);
            stale.slice(0, 20).forEach(c => console.log(\`  - \${c.card} (\${c.last_verified})\`));
            if (stale.length > 20) console.log(\`  ... and \${stale.length - 20} more\`);
          "

      # Block PRs that touch the disabled CFPB pipeline. The pipeline is
      # disabled until the rewrite (see docs/TAKEOVER_PLAN.md). Any PR
      # touching it should be intentional.
      - name: Warn if CFPB pipeline files were modified
        if: github.event_name == 'pull_request'
        run: |
          if git diff --name-only origin/main...HEAD | grep -q '^scripts/pipelines/cfpb/'; then
            echo "::warning ::This PR modifies scripts/pipelines/cfpb/. The CFPB pipeline is currently DISABLED. Confirm this PR is part of the rewrite (see docs/TAKEOVER_PLAN.md)."
          fi
